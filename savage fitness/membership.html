<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Savage Fitness - Membership</title>
   <link rel="stylesheet" href="css/styles.css">
   <link rel="icon" type="image/x-icon" href="images/favicon.ico">
</head>

<body>
   <header>
<div class="logo">

   <a href="index.html">

      <img src="images/logo.png" alt="Savage Fitness Logo">

   </a>

</div>

      <nav>
         <a href="index.html">About Us</a>
         <a href="membership.html">Membership</a>
         <a href="creative.html">Creative Page</a>
      </nav>
   </header>

   <main>
      <section class="form-section">

         <h2>Join Savage Fitness</h2>

         <form id="membershipForm">

            <label for="name">Full Name:</label>
            <input type="text" id="name">

            <label for="email">Email Address:</label>
            <input type="email" id="email">

            <label for="phone">Phone Number:</label>
            <input type="text" id="phone">

            <label for="age">Age:</label>
            <input type="number" id="age">

	    <label for="weight">Weight (lbs):</label>
<input type="number" id="weight">

<label for="height">Height:</label>
<input type="text" id="height" placeholder="Example: 5'10">

<label for="gender">Gender:</label>

<select id="gender">

   <option value="">Select One</option>

   <option>Male</option>

   <option>Female</option>

   <option>Other</option>

</select>

            <label for="membership">Membership Type:</label>
            <select id="membership">
               <option value="">Select One</option>
               <option>Basic</option>
               <option>Premium</option>
               <option>VIP</option>
            </select>

            <label for="goals">Fitness Goals:</label>
            <textarea id="goals"></textarea>

            <label for="time">Preferred Workout Time:</label>
            <input type="text" id="time">

            <label for="experience">Experience Level:</label>
            <select id="experience">
               <option value="">Select One</option>
               <option>Beginner</option>
               <option>Intermediate</option>
               <option>Advanced</option>
            </select>

            <button type="submit">Submit</button>

            <p id="message"></p>

         </form>
      </section>
   </main>

   <footer>
      <p>&copy; 2026 Savage Fitness</p>
   </footer>

   <script src="js/script.js"></script>
</body>
</html>
